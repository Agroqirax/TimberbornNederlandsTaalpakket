name: Probleem met vertalingen
description: Meld een verkeerde vertaling
title: "[Incorrecte vertaling] - Vertaling voor ... is incorrect"
labels: ["translation", "bug"]
body:
  - type: textarea
    id: current_value
    attributes:
      label: Huidige vertaling
      description: "Geef de huidige vertaling"
      placeholder: "Shanty Speaker"
    validations:
      required: true

  - type: textarea
    id: expected_value
    attributes:
      label: Verbeterde vertaling
      description: "Geef de verbeterde vertaling"
      placeholder: "Shanty Luidspreker"
    validations:
      required: false

  - type: textarea
    id: additional_notes
    attributes:
      label: Notities
      description: "Geef extra informatie die misschien van belang is"
    validations:
      required: false
